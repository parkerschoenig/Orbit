proxmox:
  hosts:
    - your-proxmox-node-a.lab.home
    - your-proxmox-node-b.lab.home

netbox:
  url: https://netbox.lab.home
  token: your-netbox-api-token-here

adguard:
  url: http://adguard.lab.home:3000
  username: admin
  password: your-adguard-password-here
  dns_target: 192.168.1.100    # Where DNS rewrites point (e.g. your reverse proxy IP)
  dns_server: 192.168.1.200    # AdGuard Home server IP — shown as the DNS to set in new LXCs

npmplus:
  url: http://npmplus.lab.home:81
  email: admin@example.com
  password: your-npmplus-password-here
  ssl_certificate: "*.lab.home"  # Certificate to auto-attach to new proxy hosts (leave blank to skip)

ssh_keys:
  - /home/user/.ssh/id_ed25519.pub  # add as many keys as needed

defaults:
  domain_suffix: lab.home
  cpu_cores: 2
  ram_mb: 2048
  disk_gb: 10
