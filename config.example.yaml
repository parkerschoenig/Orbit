proxmox:
  host: node-a-prox.lab.home        # Proxmox node hostname or IP
  ssh_user: root
  ssh_key: /home/parker/.ssh/id_ed25519
  api_token_id: root@pam!deploy         # Proxmox API token (Datacenter → API Tokens)
  api_token_secret: your-token-secret-here

netbox:
  url: https://netbox.lab.home
  token: your-netbox-api-token-here

adguard:
  url: http://adguard.lab.home:3000
  username: admin
  password: your-adguard-password-here
  dns_target: 192.168.1.100    # All DNS rewrites point here (e.g. your reverse proxy / NPMplus IP)

npmplus:
  url: http://npmplus.lab.home:81
  email: admin@example.com
  password: your-npmplus-password-here

ssh_keys:
  - /home/parker/.ssh/id_ed25519.pub              # personal PC key
  - /home/parker/.homelab-updates/id_ed25519.pub  # ansible server key

defaults:
  domain_suffix: lab.home
  cpu_cores: 2
  ram_mb: 2048
  disk_gb: 10
